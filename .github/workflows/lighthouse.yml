name: Lighthouse

on:
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x

      - name: Start static server
        run: |
          npx --yes serve . -p 3000 &
          # Wait for the server to be ready
          npx --yes wait-on http://localhost:3000

      - name: Run Lighthouse on key pages
        run: |
          lhci collect \
            --url=http://localhost:3000/eod-rc-prototype.html \
            --url=http://localhost:3000/eod-rc-team.html \
            --url=http://localhost:3000/eod-rc-service-nts.html \
            --numberOfRuns=1 \
            --settings.preset=desktop \
            --settings.skipAudits=uses-http2,is-on-https,redirects-http
        continue-on-error: true

      - name: Assert minimum scores
        run: |
          lhci assert \
            --assertions.categories:performance=warn \
            --assertions.categories:accessibility=error:0.9 \
            --assertions.categories:best-practices=warn \
            --assertions.categories:seo=error:0.9
        continue-on-error: true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 14
